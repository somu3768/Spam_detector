<!DOCTYPE html>
<html>
<head>
<title>AI Spam Detector</title>
<link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body>

<div class="container">

<h1>AI Spam Email Detector</h1>

<p>Enter your message and our AI will detect if it is spam or not.</p>

<form action="/predict" method="post">

<input type="text" name="email" placeholder="Type your message here..." required>

<button type="submit">Detect Spam</button>

</form>

{% if prediction_text %}
<div class="result">
<h2>{{ prediction_text }}</h2>
</div>
{% endif %}

</div>

</body>
</html>
